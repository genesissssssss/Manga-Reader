<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Reader - Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
        }

        .btn-primary {
            background-color: #007bff;
            color: #fff;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center space-x-4">
            <a href="index.html" aria-label="Home">
                <img src="https://t4.ftcdn.net/jpg/03/03/25/95/360_F_303259500_YRo4yGlHJ57sPVIHyE9bg5I1Plw3miuB.jpg"
                    alt="Manga Reader Logo" class="h-8">
            </a>
            <div class="flex items-center space-x-2">
                <div class="search-icon" style="background-image: url('https://cdn.pixabay.com/photo/2017/01/13/01/22/magnifying-glass-1976105_1280.png'); background-size: cover; width: 24px; height: 24px;" aria-hidden="true"></div>
                <input type="text" id="searchBar" placeholder="Search manga..."
                    class="border border-gray-300 rounded-md p-1.5 w-48 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    aria-label="Search manga">
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <select class="border border-gray-300 rounded-md p-1.5 text-sm hidden md:block" aria-label="Language selector">
                <option>English</option>
                <option>Español</option>
                <option>日本語</option>
            </select>
            <a href="login.html" class="text-sm text-blue-600 hover:underline">Log in</a>
            <a href="signup.html" class="text-sm text-blue-600 hover:underline">Sign up</a>
            <a href="favorites.html" class="text-sm text-blue-600 hover:underline">Favorites</a>
            <a href="about.html" class="text-sm text-blue-600 hover:underline">About</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-6">
        <section class="max-w-4xl mx-auto">
            <!-- Loading Skeleton -->
            <div id="loadingSkeleton" class="flex flex-col md:flex-row gap-6">
                <div class="skeleton w-full md:w-1/3 h-96 rounded-lg"></div>
                <div class="flex-1 space-y-4">
                    <div class="skeleton h-8 w-3/4 rounded"></div>
                    <div class="skeleton h-24 w-full rounded"></div>
                    <div class="skeleton h-10 w-32 rounded"></div>
                    <div class="skeleton h-6 w-24 rounded"></div>
                    <div class="space-y-2">
                        <div class="skeleton h-6 w-48 rounded"></div>
                        <div class="skeleton h-6 w-48 rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Content -->
            <div id="content" class="hidden">
                <div class="flex flex-col md:flex-row gap-6">
                    <img id="mangaCover" src="" alt="Manga Cover" class="w-full md:w-1/3 h-96 object-cover rounded-lg">
                    <div class="flex-1">
                        <h1 id="mangaTitle" class="text-2xl font-bold text-gray-800"></h1>
                        <p id="mangaDescription" class="text-gray-600 mt-2"></p>
                        <button id="favoriteBtn" class="btn-primary px-4 py-2 rounded-md mt-4"></button>
                        <a id="continueReadingBtn" href="#" class="btn-primary px-4 py-2 rounded-md mt-4 ml-2 hidden">Continue Reading →</a>
                        <h2 class="text-xl font-semibold mt-6 text-gray-800">Chapters</h2>
                        <ul id="chapterList" class="mt-4 space-y-2"></ul>
                    </div>
                </div>
            </div>

            <!-- Error State -->
            <div id="errorState" class="text-center py-12 hidden">
                <p class="text-gray-500 text-lg">Manga not found</p>
                <a href="index.html" class="text-blue-600 hover:underline mt-2 inline-block">Back to Home</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center p-4 text-sm">
        
        <div class="mt-2 flex justify-center space-x-4">
            <a href="#" class="text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded">Terms of Use</a>
            <a href="#" class="text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded">Privacy Policy</a>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        // Load favorites and reading progress from localStorage
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let readingProgress = JSON.parse(localStorage.getItem('readingProgress')) || {};

        // Get manga index from URL
        const urlParams = new URLSearchParams(window.location.search);
        const mangaIndex = parseInt(urlParams.get('manga')) || 0;

        // DOM Elements
        const mangaTitle = document.getElementById('mangaTitle');
        const mangaCover = document.getElementById('mangaCover');
        const mangaDescription = document.getElementById('mangaDescription');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const continueReadingBtn = document.getElementById('continueReadingBtn');
        const chapterList = document.getElementById('chapterList');
        const searchBar = document.getElementById('searchBar');
        const loadingSkeleton = document.getElementById('loadingSkeleton');
        const content = document.getElementById('content');
        const errorState = document.getElementById('errorState');

        // Populate manga details
        function populateDetails() {
            // Hide skeleton, show content
            loadingSkeleton.classList.add('hidden');
            
            if (mangaIndex >= 0 && mangaIndex < mangaData.length) {
                const manga = mangaData[mangaIndex];
                mangaTitle.textContent = manga.title;
                mangaCover.src = manga.cover;
                mangaCover.alt = manga.title;
                mangaDescription.textContent = manga.description;
                favoriteBtn.textContent = favorites.includes(manga.title) ? 'Remove from Favorites ★' : 'Add to Favorites ☆';
                
                // Show continue reading button if there's progress
                const progress = readingProgress[manga.title];
                if (progress) {
                    continueReadingBtn.classList.remove('hidden');
                    continueReadingBtn.href = `index.html?manga=${mangaIndex}&chapter=${progress.chapterIndex}`;
                }
                
                chapterList.innerHTML = '';
                manga.chapters.forEach((chapter, index) => {
                    const li = document.createElement('li');
                    const isCurrentChapter = progress && progress.chapterIndex === index;
                    li.innerHTML = `
                        <a href="index.html?manga=${mangaIndex}&chapter=${index}" 
                           class="chapter-link text-blue-600 hover:underline focus:outline-none focus:ring-2 focus:ring-blue-500 rounded p-1 inline-block ${isCurrentChapter ? 'font-bold' : ''}">
                            ${chapter.name} ${isCurrentChapter ? '(Continue)' : ''}
                        </a>
                    `;
                    chapterList.appendChild(li);
                });
                
                content.classList.remove('hidden');
                document.title = `Manga Reader - ${manga.title}`;
            } else {
                errorState.classList.remove('hidden');
            }
        }

        // Search functionality
        searchBar.addEventListener('input', (e) => {
            window.location.href = `index.html?search=${encodeURIComponent(e.target.value)}`;
        });

        // Favorite button
        favoriteBtn.addEventListener('click', () => {
            const title = mangaData[mangaIndex].title;
            if (favorites.includes(title)) {
                favorites = favorites.filter(t => t !== title);
                favoriteBtn.textContent = 'Add to Favorites ☆';
            } else {
                favorites.push(title);
                favoriteBtn.textContent = 'Remove from Favorites ★';
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            
            // Dispatch custom event for cross-page sync
            window.dispatchEvent(new CustomEvent('favoritesUpdated', { detail: favorites }));
        });

        // Listen for favorite updates from other pages
        window.addEventListener('favoritesUpdated', (e) => {
            favorites = e.detail;
            // Update button text
            const title = mangaData[mangaIndex].title;
            favoriteBtn.textContent = favorites.includes(title) ? 'Remove from Favorites ★' : 'Add to Favorites ☆';
        });

        // Initialize
        populateDetails();

        // Handle chapter link clicks
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('chapter-link')) {
                e.preventDefault();
                const href = e.target.getAttribute('href');
                window.location.href = href;
            }
        });
    </script>
</body>

</html>
