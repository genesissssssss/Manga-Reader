<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Reader - Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
        }

        .btn-primary {
            background-color: #007bff;
            color: #fff;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .manga-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .manga-card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center space-x-4">
            <a href="index.html" aria-label="Home">
                <img src="https://t4.ftcdn.net/jpg/03/03/25/95/360_F_303259500_YRo4yGlHJ57sPVIHyE9bg5I1Plw3miuB.jpg"
                    alt="Manga Reader Logo" class="h-8">
            </a>
            <div class="flex items-center space-x-2">
                <div class="search-icon" style="background-image: url('https://cdn.pixabay.com/photo/2017/01/13/01/22/magnifying-glass-1976105_1280.png'); background-size: cover; width: 24px; height: 24px;" aria-hidden="true"></div>
                <input type="text" id="searchBar" placeholder="Search manga..."
                    class="border border-gray-300 rounded-md p-1.5 w-48 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    aria-label="Search manga">
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <select class="border border-gray-300 rounded-md p-1.5 text-sm hidden md:block" aria-label="Language selector">
                <option>English</option>
                <option>Español</option>
                <option>日本語</option>
            </select>
            <a href="login.html" class="text-sm text-blue-600 hover:underline">Log in</a>
            <a href="signup.html" class="text-sm text-blue-600 hover:underline">Sign up</a>
            <a href="favorites.html" class="text-sm text-blue-600 hover:underline">Favorites</a>
            <a href="about.html" class="text-sm text-blue-600 hover:underline">About</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-6">
        <section class="max-w-7xl mx-auto">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Your Favorites</h2>
            
            <!-- Loading Skeleton -->
            <div id="loadingSkeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="skeleton rounded-lg h-64"></div>
                <div class="skeleton rounded-lg h-64"></div>
                <div class="skeleton rounded-lg h-64"></div>
                <div class="skeleton rounded-lg h-64"></div>
            </div>

            <!-- Favorites Grid -->
            <div id="favoritesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center p-4 text-sm">
        
        <div class="mt-2 flex justify-center space-x-4">
            <a href="#" class="text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded">Terms of Use</a>
            <a href="#" class="text-gray-400 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded">Privacy Policy</a>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        // Load favorites from localStorage
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        // DOM Elements
        const favoritesGrid = document.getElementById('favoritesGrid');
        const searchBar = document.getElementById('searchBar');
        const loadingSkeleton = document.getElementById('loadingSkeleton');

        // Populate favorites
        function populateFavorites() {
            loadingSkeleton.classList.remove('hidden');
            favoritesGrid.classList.add('hidden');
            
            setTimeout(() => {
                favoritesGrid.innerHTML = '';
                
                const favoriteManga = mangaData.filter(manga => favorites.includes(manga.title));
                
                if (favoriteManga.length === 0) {
                    favoritesGrid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <p class="text-gray-500 text-lg">You haven't added any favorites yet.</p>
                            <a href="index.html" class="text-blue-600 hover:underline mt-2 inline-block focus:outline-none focus:ring-2 focus:ring-blue-500 rounded">Browse Manga</a>
                        </div>
                    `;
                } else {
                    favoriteManga.forEach((manga) => {
                        const mangaIndex = mangaData.indexOf(manga);
                        const card = document.createElement('div');
                        card.className = 'manga-card bg-white rounded-lg overflow-hidden';
                        card.innerHTML = `
                            <img loading="lazy" src="${manga.cover}" alt="${manga.title}" class="w-full h-48 object-cover">
                            <div class="p-3">
                                <h3 class="text-sm font-semibold text-gray-800 truncate">${manga.title}</h3>
                                <p class="text-xs text-gray-600">Latest: ${manga.chapters[0].name}</p>
                                <div class="mt-2 flex space-x-2">
                                    <a href="details.html?manga=${mangaIndex}" class="btn-primary w-full text-sm px-3 py-1.5 rounded-md text-center" aria-label="View details of ${manga.title}">View Details</a>
                                    <button class="btn-primary w-12 text-sm px-3 py-1.5 rounded-md favorite-btn" data-manga="${mangaIndex}" aria-label="Remove from favorites">★</button>
                                </div>
                            </div>
                        `;
                        favoritesGrid.appendChild(card);
                    });
                }
                
                loadingSkeleton.classList.add('hidden');
                favoritesGrid.classList.remove('hidden');
            }, 500);
        }

        // Search functionality
        searchBar.addEventListener('input', (e) => {
            window.location.href = `index.html?search=${encodeURIComponent(e.target.value)}`;
        });

        // Favorite button
        favoritesGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('favorite-btn')) {
                const mangaIndex = parseInt(e.target.dataset.manga);
                const title = mangaData[mangaIndex].title;
                favorites = favorites.filter(t => t !== title);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                
                // Dispatch custom event for cross-page sync
                window.dispatchEvent(new CustomEvent('favoritesUpdated', { detail: favorites }));
                
                populateFavorites();
            }
        });

        // Listen for favorite updates from other pages
        window.addEventListener('favoritesUpdated', (e) => {
            favorites = e.detail;
            populateFavorites();
        });

        // Initialize
        populateFavorites();
    </script>
</body>

</html>
